name = "apexgrowth-auto-outreach"
main = "worker.ts"
compatibility_date = "2025-01-01"

# Daily at 8am PT (15:00 UTC) — same schedule the old Netlify job ran on.
[triggers]
crons = ["0 15 * * *"]

# Secrets (set with `npx wrangler secret put NAME` after deploy):
#   FIREBASE_SERVICE_ACCOUNT
#   GEMINI_API_KEY
#   RESEND_API_KEY
#
# Public env var:
[vars]
RESEND_DOMAIN = "scprecisiondeburring.com"
